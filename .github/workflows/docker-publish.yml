name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/pptx2mp4
          tags: |
            # Erstellt einen Tag mit der exakten Version (z.B. v1.2.3)
            type=semver,pattern={{version}}
            # Erstellt Tags für Major & Minor (z.B. v1.2 und v1)
            type=semver,pattern={{major}}.{{minor}}
            # Setzt 'latest' immer auf den neuesten Tag-Push
            type=raw,value=latest,enable=true
            # Optional: Short SHA für bessere Rückverfolgbarkeit
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BASE_PATH=${{ vars.VITE_BASE_PATH || '/pptx2mp4/' }}
          # Nutzt GitHub Actions Cache für schnellere Builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
